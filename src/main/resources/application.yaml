server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:backend_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: false
    out-of-order: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/youtube.upload
              - https://www.googleapis.com/auth/youtube.readonly
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  jwt-secret: ${JWT_SECRET}
  jwt-expiration: ${JWT_EXPIRATION:86400000}

google:
  token-verify-url: https://oauth2.googleapis.com/tokeninfo?id_token=
  generative-ai-api-key: ${GOOGLE_GENERATIVE_AI_API_KEY}
  video-api-timeout-seconds: ${GOOGLE_VIDEO_API_TIMEOUT:300}

video-generation:
  polling-interval-seconds: ${VIDEO_POLLING_INTERVAL:30}

youtube:
  api-timeout-seconds: ${YOUTUBE_API_TIMEOUT:300}
  max-retries: ${YOUTUBE_MAX_RETRIES:3}
  rate-limit:
    requests-per-minute: ${YOUTUBE_RATE_LIMIT_RPM:100}
    quota-units-per-day: ${YOUTUBE_QUOTA_UNITS_DAY:10000}
