server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db.migration   # ← apunta a tu carpeta real

  jpa:
    hibernate:
      ddl-auto: validate                # ← cambiar de update a validate en producción
    show-sql: false                    # ← desactiva en producción
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/youtube.upload
              - https://www.googleapis.com/auth/youtube.readonly
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

app:
  frontend-url: ${FRONTEND_URL:}  # ← Cambia a tu dominio real
  backend-url: ${BACKEND_URL:}     # ← Cambia a tu dominio real
  jwt-secret: ${JWT_SECRET:} # ← Usa un secreto fuerte
  jwt-expiration: ${JWT_EXPIRATION:}                     # ← 24 horas

google:
  token-verify-url: https://oauth2.googleapis.com/tokeninfo?id_token=
  generative-ai-api-key: ${GOOGLE_GENERATIVE_AI_API_KEY:}
  video-api-timeout-seconds: ${GOOGLE_VIDEO_API_TIMEOUT}

video-generation:
  polling-interval-seconds: ${VIDEO_POLLING_INTERVAL:}

youtube:
  api-timeout-seconds: ${YOUTUBE_API_TIMEOUT:300}
  max-retries: ${YOUTUBE_MAX_RETRIES:3}
  rate-limit:
    requests-per-minute: ${YOUTUBE_RATE_LIMIT_RPM:100}
    quota-units-per-day: ${YOUTUBE_QUOTA_UNITS_DAY:10000}

