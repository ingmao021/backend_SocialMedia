server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:backend_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/youtube.upload
              - https://www.googleapis.com/auth/youtube.readonly
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  jwt-secret: ${JWT_SECRET}
  jwt-expiration: ${JWT_EXPIRATION:86400000}

vertex-ai:
  project-id: ${GOOGLE_CLOUD_PROJECT_ID}
  client-email: ${GOOGLE_CLOUD_CLIENT_EMAIL}
  private-key: ${GOOGLE_CLOUD_PRIVATE_KEY}
  private-key-id: ${GOOGLE_CLOUD_PRIVATE_KEY_ID:}
  client-id: ${GOOGLE_CLOUD_CLIENT_ID:}

google:
  token-verify-url: https://oauth2.googleapis.com/tokeninfo?id_token=
  generative-ai-api-key: ${GOOGLE_GENERATIVE_AI_API_KEY:}
  video-api-timeout-seconds: ${GOOGLE_VIDEO_API_TIMEOUT:300}

video-generation:
  polling-interval-seconds: ${VIDEO_POLLING_INTERVAL:30}
  max-processing-hours: ${VIDEO_MAX_PROCESSING_HOURS:2}

youtube:
  api-timeout-seconds: ${YOUTUBE_API_TIMEOUT:300}
  max-retries: ${YOUTUBE_MAX_RETRIES:3}
  rate-limit:
    requests-per-minute: ${YOUTUBE_RATE_LIMIT_RPM:100}
    quota-units-per-day: ${YOUTUBE_QUOTA_UNITS_DAY:10000}

logging:
  level:
    com.example.backend_socialmedia: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    com.google.auth: WARN
