spring:
  jpa:
    hibernate:
      ddl-auto: none          # ← cambiar de "validate" a "none"
                              #   validate hace queries pesadas al arrancar
                              #   Flyway ya garantiza que el schema es correcto
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false
        # ← BORRAR la línea dialect: (Hibernate ya la detecta solo, el WARN lo dice)

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    com.socialvideo: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO