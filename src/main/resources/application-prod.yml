server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 200  # Optimizado para Render's multi-threading
      min-spare: 10
    connection-timeout: 20000
    keep-alive-timeout: 20000
    max-http-header-size: 8192
    max-swallow-size: 2MB
    accept-count: 100
    max-connections: 8192

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:backend_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Configuración optimizada para producción
      maximum-pool-size: 20  # Más conexiones para alta concurrencia
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      # Configuración adicional para estabilidad
      auto-commit: true
      isolation-level: TRANSACTION_READ_COMMITTED
      driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    # Optimizaciones para producción
    ignore-missing-migrations: false
    ignore-ignored-migrations: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20
        # Optimizaciones de producción
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        generate_statistics: false
        # Cache de segundo nivel (deshabilitado para simplicidad)
        cache:
          use_second_level_cache: false
          use_query_cache: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/youtube.upload
              - https://www.googleapis.com/auth/youtube.readonly
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # Configuraciones adicionales para producción
  main:
    banner-mode: off  # Deshabilitar banner de Spring Boot
  profiles:
    active: prod

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  jwt-secret: ${JWT_SECRET}
  jwt-expiration: ${JWT_EXPIRATION:86400000}

vertex-ai:
  project-id: ${GOOGLE_CLOUD_PROJECT_ID}
  client-email: ${GOOGLE_CLOUD_CLIENT_EMAIL}
  private-key: ${GOOGLE_CLOUD_PRIVATE_KEY}
  private-key-id: ${GOOGLE_CLOUD_PRIVATE_KEY_ID:}
  client-id: ${GOOGLE_CLOUD_CLIENT_ID:}

google:
  token-verify-url: https://oauth2.googleapis.com/tokeninfo?id_token=
  generative-ai-api-key: ${GOOGLE_GENERATIVE_AI_API_KEY:}
  video-api-timeout-seconds: ${GOOGLE_VIDEO_API_TIMEOUT:300}

video-generation:
  polling-interval-seconds: ${VIDEO_POLLING_INTERVAL:30}
  max-processing-hours: ${VIDEO_MAX_PROCESSING_HOURS:2}

youtube:
  api-timeout-seconds: ${YOUTUBE_API_TIMEOUT:300}
  max-retries: ${YOUTUBE_MAX_RETRIES:3}
  rate-limit:
    requests-per-minute: ${YOUTUBE_RATE_LIMIT_RPM:100}
    quota-units-per-day: ${YOUTUBE_QUOTA_UNITS_DAY:10000}

logging:
  level:
    # Logging optimizado para producción
    com.example.backend_socialmedia: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    com.google.auth: WARN
    # Reducir ruido de dependencias
    org.springframework.boot: WARN
    org.apache.catalina: WARN
    org.apache.coyote: WARN
    org.apache.tomcat: WARN
    com.zaxxer.hikari: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  # Logging a archivo en producción (opcional)
  # file:
  #   name: logs/backend-socialmedia.log
  #   max-size: 10MB
  #   max-history: 30

# Configuraciones específicas de JVM para Render
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    diskspace:
      enabled: false  # Deshabilitar en contenedores
  metrics:
    export:
      jmx:
        enabled: true

# Configuración de métricas para monitoreo
springdoc:
  api-docs:
    enabled: false  # Deshabilitar en producción por seguridad
  swagger-ui:
    enabled: false  # Deshabilitar en producción por seguridad
