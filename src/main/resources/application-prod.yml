spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false    # ← nombre nuevo (reemplaza temp.use_jdbc_metadata_defaults)
        dialect: org.hibernate.dialect.PostgreSQLDialect    # ← AGREGAR ESTO
                                                             #   sin esto, Hibernate no sabe
                                                             #   qué BD usar cuando metadata está deshabilitada

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    com.socialvideo: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO